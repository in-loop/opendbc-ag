name: Consistency

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: consistency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scope-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run scope-policy + duplicate + citation checks
        run: python scripts/check_dbc_policy.py
